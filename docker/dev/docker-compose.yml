version: "3.9"

services:
  backend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.backend
      target: dev
    env_file:
      - ../../backend/.env
    environment:
      NODE_ENV: development
      PORT: "8001"
      DATABASE_URL: postgresql://${DB_USERNAME:-trovera}:${DB_PASSWORD:-trovera}@postgres:${DB_PORT:-5432}/${DB_NAME:-trovera_db}
      REDIS_URL: redis://redis:6379/0
      DB_POOL_SIZE: "5"
      # SMTP_HOST: mailhog
      # SMTP_PORT: "1025"
    volumes:
      - ../../backend/src:/app/src
      - backend_uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.frontend
      target: dev
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NODE_ENV: development
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-trovera_db}
      POSTGRES_USER: ${DB_USERNAME:-trovera}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trovera}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trovera} -d ${DB_NAME:-trovera_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 20 1 --loglevel warning
    deploy:
      resources:
        limits:
          cpus: "0.50"
        reservations:
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # mailhog:
  #   image: mailhog/mailhog:latest
  #   ports:
  #     - "8025:8025"
  #     - "1025:1025"
  #   restart: unless-stopped

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@trovera.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_LISTEN_PORT: "80"
  #   ports:
  #     - "5050:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  # pgadmin_data:
  backend_uploads:
  backend_node_modules:
