version: "3.9"

services:
  backend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.backend
      target: dev
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/.env:/app/.env
      - backend_uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    ports:
      - "8001:8001"
    environment:
      NODE_ENV: development
      PORT: "8001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: trovera
      DB_PASSWORD: trovera
      DB_NAME: trovera_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-prod-must-be-32-chars-minimum
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: "7"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: noreply@trovera.local
      SMTP_FROM_NAME: Trovera Library
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: "10"
      RATE_LIMIT_PER_MINUTE: "60"
      AUTH_RATE_LIMIT_PER_MINUTE: "5"
      LIBRE_TRANSLATE_URL: ""
      DEEPLX_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: docker/Dockerfile.frontend
      target: dev
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/public:/app/public
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      NODE_ENV: development
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trovera_db
      POSTGRES_USER: trovera
      POSTGRES_PASSWORD: trovera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trovera -d trovera_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trovera.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: "80"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  backend_uploads:
  backend_node_modules:
